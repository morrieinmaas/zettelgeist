name: Changeset check

# On PR: if the diff touches any package under packages/ but doesn't add a
# changeset, post a friendly comment. Soft check (not required) — docs-only
# or test-only PRs may legitimately have no changeset.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository  # skip forks; comment perms differ
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Detect missing changeset
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No version/publish args → action runs in "status" mode and comments
        # on the PR if a changeset is missing.
